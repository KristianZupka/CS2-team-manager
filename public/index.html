<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="yo.css">

<title>CS2 Team Manager</title>

</head>

<body>

<header class="topbar">

<img src="game-icon.png" id="logo">

<h1>CS2 TEAM MANAGER</h1>

</header>

<div class="container">

<div class="map-section">

<h3 class="map-title">Map</h3>

<select id="mapSelect" onchange="changeMap()">

<option value="dust_II">Dust2</option>
<option value="mirage">Mirage</option>
<option value="inferno">Inferno</option>
<option value="nuke">Nuke</option>
<option value="overpass">Overpass</option>
<option value="ancient">Ancient</option>
<option value="anubis">Anubis</option>

</select>

<div class="map-wrapper">

<img id="mapImage" src="mapy/dust_II_radar.png">

<div id="map"></div>

</div>

</div>

<div class="sidebar">

<h2>Players</h2>

<h3>Filter by role</h3>

<select id="filterRole">

<option value="">All</option>
<option>AWPer</option>
<option>IGL</option>
<option>Entry</option>
<option>Lurker</option>
<option>Anchor</option>

</select>

<button onclick="filterPlayers()">Filter</button>

<div id="players"></div>

<h3>Add Player</h3>

<input id="nickname" placeholder="Nickname">

<select id="type">

<option value="player">Player</option>
<option value="coach">Coach</option>

</select>

<select id="role">

<option>AWPer</option>
<option>IGL</option>
<option>Entry</option>
<option>Lurker</option>
<option>Anchor</option>

</select>

<button onclick="addPlayer()">Add Player</button>

</div>

</div>

<div id="editForm" class="edit-form">

<h3>Edit Player</h3>

<input id="editNickname">

<select id="editRole">

<option>AWPer</option>
<option>IGL</option>
<option>Entry</option>
<option>Lurker</option>
<option>Anchor</option>

</select>

<button onclick="saveEdit()">Save</button>
<button onclick="closeEdit()">Cancel</button>

</div>

<script src="bruh.js"></script>

</body>
</html>
